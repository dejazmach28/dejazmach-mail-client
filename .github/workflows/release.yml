name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            build_command: npx electron-builder --linux --publish always
            artifact_path: |
              release/*.AppImage
              release/*.deb
          - os: windows-latest
            artifact_name: windows
            build_command: npx electron-builder --win --publish always
            artifact_path: |
              release/*.exe
              release/*.blockmap
          - os: macos-latest
            artifact_name: macos
            build_command: npx electron-builder --mac --publish always
            artifact_path: |
              release/*.dmg
              release/*.zip
              release/*.blockmap

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run ci
      - name: Build and publish release assets
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: dejazmach-${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_path }}
